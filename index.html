<!DOCTYPE html>
<html lang="zh-CN">
 <head> 
  <meta charset="UTF-8" /> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0" /> 
  <title>巴特沃斯低通滤波器 LC 参数计算器</title> 
  <link rel="stylesheet" href="./css/Rendering.css" /> 
 </head> 
 <body> 
  <div class="container"> 
   <h1>巴特沃斯低通滤波器计算器</h1> 
   <p>输入设计参数，生成对应 LC 梯形网络（Low-Pass）的电感（L）和电容（C）值。</p> 
   <div class="form-group"> 
    <label for="freq">截止频率 (fc)</label> 
    <div class="input-group"> 
     <input type="number" id="freq" placeholder="例如: 10" step="any" required="" /> 
     <select id="freqUnit"> <option value="1">Hz</option> <option value="1e3">kHz</option> <option value="1e6" selected="">MHz</option> <option value="1e9">GHz</option> </select> 
    </div> 
   </div> 
   <div class="form-group"> 
    <label for="impedance">特性阻抗 (Z0)</label> 
    <div class="input-group"> 
     <input type="number" id="impedance" placeholder="例如: 50" value="50" step="any" required="" /> 
     <select disabled=""> <option>Ω (欧姆)</option> </select> 
    </div> 
   </div> 
   <div class="form-group"> 
    <label for="order">滤波器阶数 (n)</label> 
    <div class="input-group"> 
     <input type="number" id="order" placeholder="例如: 3" value="3" min="1" max="20" step="1" required="" /> 
    </div> 
   </div> 
   <button onclick="calculateFilter()">计算参数</button> 
   <div class="results" id="results"> 
    <h2>计算结果</h2> 
    <div class="topology"> 
     <h3>拓扑结构 1：首个元件为【串联电感】(T型起始)</h3> 
     <p class="note">信号源 -&gt; 串联L1 -&gt; 并联C2 -&gt; 串联L3 -&gt; ... -&gt; 负载</p> 
     <table id="tableTop1"> 
      <thead> 
       <tr> 
        <th>元件位号 (k)</th> 
        <th>元件类型</th> 
        <th>计算值</th> 
        <th>归一化参数 (gk)</th> 
       </tr> 
      </thead> 
      <tbody></tbody> 
     </table> 
    </div> 
    <div class="topology"> 
     <h3>拓扑结构 2：首个元件为【并联电容】(π型起始)</h3> 
     <p class="note">信号源 -&gt; 并联C1 -&gt; 串联L2 -&gt; 并联C3 -&gt; ... -&gt; 负载</p> 
     <table id="tableTop2"> 
      <thead> 
       <tr> 
        <th>元件位号 (k)</th> 
        <th>元件类型</th> 
        <th>计算值</th> 
        <th>归一化参数 (gk)</th> 
       </tr> 
      </thead> 
      <tbody></tbody> 
     </table> 
    </div> 
   </div> 
  </div> 
  <script type="text/javascript" src="./js/calculate.js"></script>  
 </body>
</html>
